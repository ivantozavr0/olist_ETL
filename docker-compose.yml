services:

  spark-master:
    build: 
      context: .            
      dockerfile: spark/Dockerfile
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
    ports:
      - "8088:8080"   # веб-интерфейс мастера
      - "7077:7077"   # порт для подключения воркеров и приложений

  spark-worker-1:
    build: 
      context: .             
      dockerfile: spark/Dockerfile
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_MEMORY=3g
      - SPARK_WORKER_CORES=2
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    ports:
      - "8081:8081"  

  spark-worker-2:
    build: 
      context: .             
      dockerfile: spark/Dockerfile
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_MEMORY=3g
      - SPARK_WORKER_CORES=2
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    ports:
      - "8082:8081"
      
  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"   
      - "9001:9001"   
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}      
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_USER}  
    volumes:
      - ./minio-data:/data                    
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-server
    ports:
      - "8123:8123"   
      - "8999:9000"   
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD} 
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1 
    volumes:
      - ./clickhouse_data:/var/lib/clickhouse 
    ulimits:
      nofile:
        soft: 262144
        hard: 262144 
      
  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./airflow/postgres:/var/lib/postgresql/data   

  airflow-init:
    user: "${AIRFLOW_UID:-50000}:0"
    build: 
      context: .             
      dockerfile: airflow/Dockerfile
    depends_on:
      - postgres-airflow
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_FIRSTNAME: admin
      _AIRFLOW_WWW_USER_LASTNAME: admin
      _AIRFLOW_WWW_USER_ROLE: Admin
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
      AIRFLOW_CONN_SPARK_DEFAULT: spark://spark-master:7077
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}      
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_USER}  
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD} 
      PYTHONPATH: /opt/project/jobs
      JOBS_LOG_PATH: /opt/project/jobs-logs
      JOBS_PATH: /opt/project/jobs
      MINIO_BUCKET: olist
      QUARANTINE_LAYER: quarantine
      RAW_LAYER: raw
      BRONZE_LAYER: bronze
      SILVER_LAYER: silver
    command:
      - bash
      - -c
      - |
          airflow db migrate
          airflow users create \
            --username admin \
            --password admin \
            --firstname admin \
            --lastname admin \
            --role Admin \
            --email admin@example.com

  airflow-webserver:
    user: "${AIRFLOW_UID:-50000}:0"
    build: 
      context: .             
      dockerfile: airflow/Dockerfile
    container_name: airflow-webserver
    restart: always
    depends_on:
      - airflow-init
    ports:
      - "8085:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./jobs:/opt/project/jobs
      - ./jobs-logs:/opt/project/jobs-logs
      - ./airflow/airflow-logs:/opt/airflow/logs
      - ./clickhouse-schema:/opt/spark/clickhouse-schema
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      AIRFLOW_CONN_SPARK_DEFAULT: spark://spark-master:7077
      SPARK_BINARY: /opt/spark/bin/spark-submit
      CONN_ID: spark_default
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}      
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_USER}  
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD} 
      PYTHONPATH: /opt/project/jobs
      JOBS_LOG_PATH: /opt/project/jobs-logs
      JOBS_PATH: /opt/project/jobs
      MINIO_BUCKET: olist
      QUARANTINE_LAYER: quarantine
      RAW_LAYER: raw
      BRONZE_LAYER: bronze
      SILVER_LAYER: silver
    command: webserver

  airflow-scheduler:
    user: "${AIRFLOW_UID:-50000}:0"
    build: 
      context: .             
      dockerfile: airflow/Dockerfile
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - airflow-webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./jobs:/opt/project/jobs
      - ./jobs-logs:/opt/project/jobs-logs
      - ./airflow/airflow-logs:/opt/airflow/logs
      - ./clickhouse-schema:/opt/spark/clickhouse-schema
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      AIRFLOW_CONN_SPARK_DEFAULT: spark://spark-master:7077
      SPARK_BINARY: /opt/spark/bin/spark-submit
      CONN_ID: spark_default
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}      
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_USER}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}  
      PYTHONPATH: /opt/project/jobs
      JOBS_LOG_PATH: /opt/project/jobs-logs
      JOBS_PATH: /opt/project/jobs
      MINIO_BUCKET: olist
      QUARANTINE_LAYER: quarantine
      RAW_LAYER: raw
      BRONZE_LAYER: bronze
      SILVER_LAYER: silver
    command: scheduler
    
  metabase:
    build: 
      context: .             
      dockerfile: metabase/Dockerfile
    #image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3000:3000"  
    volumes:
      - ./metabase/data:/metabase.db  
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase.db/metabase.db
    depends_on:
      - clickhouse  
       
   
   
   
   
      
